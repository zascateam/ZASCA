# Python 解释器下载镜像配置
# uv 默认从 GitHub (astral-sh/python-build-standalone) 下载 Python
# 国内可通过以下方式加速：
#
# 方式1：环境变量（推荐，灵活配置）
#   export UV_PYTHON_INSTALL_MIRROR=https://your-mirror.com/github/astral-sh/python-build-standalone/releases/download
#
# 方式2：使用 GitHub 代理
#   export UV_PYTHON_INSTALL_MIRROR=https://ghproxy.com/https://github.com/astral-sh/python-build-standalone/releases/download
#
# 方式3：本地镜像
#   export UV_PYTHON_INSTALL_MIRROR=file:///path/to/local/python-build-standalone
