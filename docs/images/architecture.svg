<?xml version="1.0" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="adminGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00aeff"/>
      <stop offset="100%" stop-color="#0043ff"/>
    </linearGradient>
    <linearGradient id="hostGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#11998e"/>
      <stop offset="100%" stop-color="#38ef7d"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="400" fill="#f8fafc" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="30" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#1e293b" text-anchor="middle">ZASCA 零代理安全管控架构</text>

  <!-- 管理层 -->
  <rect x="50" y="60" width="700" height="80" fill="#e0e7ff" stroke="#c7d2fe" stroke-width="1" rx="8"/>
  <text x="70" y="85" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#4338ca">管理层</text>

  <rect x="80" y="95" width="120" height="30" fill="url(#adminGrad)" rx="6"/>
  <text x="140" y="115" font-family="system-ui, sans-serif" font-size="11" fill="white" text-anchor="middle">Django Admin</text>

  <rect x="220" y="95" width="120" height="30" fill="url(#adminGrad)" rx="6"/>
  <text x="280" y="115" font-family="system-ui, sans-serif" font-size="11" fill="white" text-anchor="middle">RBAC 权限</text>

  <rect x="360" y="95" width="120" height="30" fill="url(#adminGrad)" rx="6"/>
  <text x="420" y="115" font-family="system-ui, sans-serif" font-size="11" fill="white" text-anchor="middle">安全审计</text>

  <rect x="500" y="95" width="120" height="30" fill="url(#adminGrad)" rx="6"/>
  <text x="560" y="115" font-family="system-ui, sans-serif" font-size="11" fill="white" text-anchor="middle">工单系统</text>

  <!-- 核心层 -->
  <rect x="50" y="160" width="700" height="80" fill="#dbeafe" stroke="#bfdbfe" stroke-width="1" rx="8"/>
  <text x="70" y="185" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#1e40af">核心层</text>

  <rect x="80" y="195" width="120" height="30" fill="url(#coreGrad)" rx="6"/>
  <text x="140" y="215" font-family="system-ui, sans-serif" font-size="11" fill="white" text-anchor="middle">WinRM 协议</text>

  <rect x="220" y="195" width="120" height="30" fill="url(#coreGrad)" rx="6"/>
  <text x="280" y="215" font-family="system-ui, sans-serif" font-size="11" fill="white" text-anchor="middle">主机管理</text>

  <rect x="360" y="195" width="120" height="30" fill="url(#coreGrad)" rx="6"/>
  <text x="420" y="215" font-family="system-ui, sans-serif" font-size="11" fill="white" text-anchor="middle">运维操作</text>

  <rect x="500" y="195" width="120" height="30" fill="url(#coreGrad)" rx="6"/>
  <text x="560" y="215" font-family="system-ui, sans-serif" font-size="11" fill="white" text-anchor="middle">任务队列</text>

  <!-- 主机层 -->
  <rect x="50" y="260" width="700" height="80" fill="#d1fae5" stroke="#a7f3d0" stroke-width="1" rx="8"/>
  <text x="70" y="285" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#065f46">主机层</text>

  <rect x="80" y="295" width="120" height="30" fill="url(#hostGrad)" rx="6"/>
  <text x="140" y="315" font-family="system-ui, sans-serif" font-size="11" fill="white" text-anchor="middle">Windows Server</text>

  <rect x="220" y="295" width="120" height="30" fill="url(#hostGrad)" rx="6"/>
  <text x="280" y="315" font-family="system-ui, sans-serif" font-size="11" fill="white" text-anchor="middle">Windows 10/11</text>

  <rect x="360" y="295" width="120" height="30" fill="url(#hostGrad)" rx="6"/>
  <text x="420" y="315" font-family="system-ui, sans-serif" font-size="11" fill="white" text-anchor="middle">零代理部署</text>

  <!-- 连接线 -->
  <line x1="400" y1="140" x2="400" y2="160" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="240" x2="400" y2="260" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 特性标签 -->
  <rect x="640" y="95" width="100" height="30" fill="#fef3c7" stroke="#fbbf24" stroke-width="1" rx="6"/>
  <text x="690" y="115" font-family="system-ui, sans-serif" font-size="10" fill="#92400e" text-anchor="middle">Material Design 3</text>

  <rect x="640" y="195" width="100" height="30" fill="#fef3c7" stroke="#fbbf24" stroke-width="1" rx="6"/>
  <text x="690" y="215" font-family="system-ui, sans-serif" font-size="10" fill="#92400e" text-anchor="middle">TLS/SSL 加密</text>

  <rect x="640" y="295" width="100" height="30" fill="#fef3c7" stroke="#fbbf24" stroke-width="1" rx="6"/>
  <text x="690" y="315" font-family="system-ui, sans-serif" font-size="10" fill="#92400e" text-anchor="middle">WinRM 协议</text>
</svg>
