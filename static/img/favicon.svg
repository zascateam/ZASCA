<?xml version="1.0" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-2 -6 68 76" width="64" height="64">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00aeff"/>
      <stop offset="100%" stop-color="#0043ff"/>
    </linearGradient>
  </defs>

  <!-- 盾牌背景 -->
  <path d="M32 4 L56 14 Q56 34 32 60 Q8 34 8 14 Z" fill="url(#shieldGrad)" stroke="none"/>

  <!-- 内部阴影让盾牌更立体 -->
  <path d="M32 4 L56 14 Q56 34 32 60 Q8 34 8 14 Z" fill="rgba(0,0,0,0.15)"/>

  <!-- 锁身（圆角矩形） -->
  <rect x="22" y="28" width="20" height="16" rx="2.5" fill="#ffffff"/>

  <!-- 锁梁（圆环） -->
  <path d="M26 28 V22 a6 6 0 0 1 12 0 v6" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>

  <!-- 锁孔 -->
  <circle cx="32" cy="34" r="1.8" fill="#0043ff"/>
  <path d="M31.2 34 h1.6 v3 h-1.6 z" fill="#0043ff"/>

  <!-- 右下角“远程控制”箭头符号 -->
  <g transform="translate(38, 42)">
    <path d="M0 0 L10 8 L0 16" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 左上角“零代理”圆点 -->
  <circle cx="20" cy="20" r="2.8" fill="#ffffff"/>
  <circle cx="20" cy="20" r="1.4" fill="#0043ff"/>
</svg>